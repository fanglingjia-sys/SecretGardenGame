name: Publish uploaded Moyu98 site

on:
  push:
    branches: [main]
    paths:
      - 'moyu98-site-*.zip.part*'
      - '.github/workflows/unpack-site-upload.yml'

permissions:
  contents: write

jobs:
  unpack-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild site from uploaded parts
        shell: bash
        run: |
          if ! compgen -G 'moyu98-site-*.zip.part*' > /dev/null; then
            echo 'No package parts remain; nothing to publish.'
            exit 0
          fi
          cat moyu98-site-*.zip.part* > /tmp/moyu98-site.zip
          mkdir -p /tmp/moyu98-site
          unzip -q -o /tmp/moyu98-site.zip -d /tmp/moyu98-site
          rsync -a --delete --exclude='.git' --exclude='.github' /tmp/moyu98-site/ ./
          touch .nojekyll
          rm -f moyu98-site-*.zip.part*
      - name: Commit published site
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No site changes to commit.'
            exit 0
          fi
          git commit -m 'Publish latest Moyu98 demo'
          git push
