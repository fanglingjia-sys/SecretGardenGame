  function hideInteraction(clear=true){interactionPrompt.classList.remove("show");document.querySelectorAll("#family-mode .village-building.nearby,#family-mode .farm-house.nearby").forEach(el=>el.classList.remove("nearby"));if(clear)pendingInteraction=null}
  function approachPoint(el){
    refreshCollisionSnapshot();const r=rectInMap(el),p=playerPosition();
    if(el.classList.contains("farm-house"))return nearestWalkable(r.x+r.w/2,r.y+r.h+46);
    const candidates=[{x:r.x+r.w/2,y:r.y+r.h+55},{x:r.x-48,y:r.y+r.h*.72},{x:r.x+r.w+48,y:r.y+r.h*.72},{x:r.x+r.w/2,y:r.y-46}].map(c=>nearestWalkable(c.x,c.y)).filter(Boolean);candidates.sort((a,b)=>Math.hypot(a.x-p.x,a.y-p.y)-Math.hypot(b.x-p.x,b.y-p.y));return candidates[0]
  }
  function requestBuildingInteraction(el){
    const target=approachPoint(el);if(!target)return toast("门口被挡住了，先搬开附近建筑");pendingInteraction=el;const name=el.querySelector("strong,.house-sign")?.textContent.trim()||el.getAttribute("aria-label")||"场景互动";$("interaction-name").textContent=name;movePlayerTo(target.x,target.y,()=>{if(pendingInteraction!==el)return;el.classList.add("nearby");interactionPrompt.classList.add("show")})

    panGesture={id:e.pointerId,startX:e.clientX,startY:e.clientY,originX:cameraX,originY:cameraY,dragging:false};
  });
  farmViewport.addEventListener("pointermove",e=>{
    if(!panGesture||panGesture.id!==e.pointerId)return;const dx=e.clientX-panGesture.startX,dy=e.clientY-panGesture.startY;
    if(!panGesture.dragging&&Math.hypot(dx,dy)>8){panGesture.dragging=true;farmViewport.classList.add("camera-dragging");try{farmViewport.setPointerCapture(e.pointerId)}catch(err){}}
    if(!panGesture.dragging)return;e.preventDefault();setCamera(panGesture.originX-dx,0,true)
  },{passive:false});
  const finishCameraPan=e=>{if(!panGesture||panGesture.id!==e.pointerId)return;if(panGesture.dragging){suppressMapClickUntil=Date.now()+260;farmViewport.classList.remove("camera-dragging");layoutMap.classList.remove("camera-moving")}panGesture=null};
